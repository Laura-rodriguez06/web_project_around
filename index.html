<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./vendor/normalize.css" />
    <link rel="stylesheet" href="./pages/index.css" />

    <title>Around The U.S.</title>
  </head>

  <body class="page">
    <header class="header">
      <img src="./images/ttitulo.svg" class="header__logo" />
      <div class="header__line"></div>
    </header>

    <main class="content">
      <section class="profile">
        <div class="profile__left">
          <img src="./images/Avatar.jpg" class="profile__avatar" />

          <div class="profile__info">
            <div class="profile__name-row">
              <h2 class="profile__name">Jacques Cousteau</h2>

              <button class="profile__edit-button" type="button">
                <img src="./images/lapiz.svg" />
              </button>
            </div>

            <p class="profile__about">Explorador</p>
          </div>
        </div>

        <button class="profile__add-button" type="button">+</button>
      </section>

      <section class="cards">
        <ul class="cards__list"></ul>
      </section>
    </main>

    <footer class="footer">
      <p class="footer__text">© 2025 Around The U.S.</p>
    </footer>

    <!-- TEMPLATE -->
    <template id="card-template">
      <li class="cards__item">
        <button class="cards__delete-button">🗑</button>

        <img class="cards__image" />

        <div class="cards__title-group">
          <h2 class="cards__title"></h2>

          <button class="cards__like-button">
            <img
              src="./images/coradesactivado.svg"
              class="cards__like-icon"
              data-active="false"
            />
          </button>
        </div>
      </li>
    </template>

    <!-- EDITAR PERFIL -->
    <div class="popup popup_type_edit">
      <div class="popup__container">
        <button class="popup__close">✕</button>

        <form class="popup__form">
          <input
            type="text"
            name="name"
            class="popup__input"
            required
            minlength="2"
            maxlength="40"
          />
          <span class="popup__error"></span>

          <input
            type="text"
            name="about"
            class="popup__input"
            required
            minlength="2"
            maxlength="200"
          />
          <span class="popup__error"></span>

          <button type="submit" class="popup__submit">Guardar</button>
        </form>
      </div>
    </div>

    <!-- AGREGAR TARJETA -->
    <div class="popup popup_type_add-card">
      <div class="popup__content">
        <button class="popup__close">✕</button>
        <h3 class="popup__title">Nueva tarjeta</h3>
        <form class="popup__form popup__form_type_add-card" novalidate>
          <input
            type="text"
            name="title"
            class="popup__input"
            required
            minlength="2"
            maxlength="30"
          />
          <span class="popup__error"></span>

          <input type="url" name="image" class="popup__input" required />
          <span class="popup__error"></span>

          <button type="submit" class="popup__submit">Crear</button>
        </form>
      </div>
    </div>

    <!-- IMAGEN -->
    <div class="popup popup_type_image">
      <div class="popup__image-container">
        <button class="popup__close">✕</button>
        <img class="popup__image" />
        <p class="popup__caption"></p>
      </div>
    </div>

    <script src="./scripts/index.js"></script>
  </body>
</html>
